name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          echo "Extracted version: $TAG"

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ steps.version.outputs.VERSION }}"
            # 提取 ## [VERSION] 到下一个 ## [ 之间内容，排除空行
            CHANGELOG=$(awk -v ver="$VERSION" '
              found && /^## \[/ { exit }
              found { if (NF) print }
              /^## \['"'"'[0-9]/ { gsub(/\[|\]/,"",$2); if ($2 == ver) found=1 }
            ' CHANGELOG.md)
            CHANGELOG="${CHANGELOG//$'\n'/\\n}"
            echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
            echo "Changelog extracted (${#CHANGELOG} chars)"
          else
            echo "changelog=See the commit history for details." >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish
          else
            echo "NPM_TOKEN not configured — skipping npm publish."
            echo "To enable: add NPM_TOKEN secret to repo Settings → Secrets → Actions"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
